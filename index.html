  <script type="text/javascript">

        var decoded = {};
        l.search.slice(1).split('&').forEach(function(s) {
          var p = s.split('=');
          decoded[p[0]] = p[1] ? p[1].replace(/~and~/g, '&') : '';
        });
        if (decoded.p !== undefined) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (decoded.p ? '/' + decoded.p : '') +
            (decoded.q ? '?' + decoded.q : '') +
            l.hash
          );
        }
      }
    }(window.location));
  </script>
